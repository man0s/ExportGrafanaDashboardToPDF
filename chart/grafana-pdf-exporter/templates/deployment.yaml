apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grafana-pdf-exporter.fullname" . }}
  labels:
    {{- include "grafana-pdf-exporter.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "grafana-pdf-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "grafana-pdf-exporter.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "grafana-pdf-exporter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "grafana-pdf-exporter.fullname" . }}-config
          env:
            {{- if .Values.existingSecret }}
            - name: GRAFANA_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: username
                  optional: true
            - name: GRAFANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: password
            {{- else }}
            - name: GRAFANA_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "grafana-pdf-exporter.fullname" . }}-credentials
                  key: GRAFANA_USER
            - name: GRAFANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "grafana-pdf-exporter.fullname" . }}-credentials
                  key: GRAFANA_PASSWORD
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.output.mountPath }}
              subPath: {{ .Values.persistence.output.subPath }}
            {{- if .Values.persistence.debug.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.debug.mountPath }}
              subPath: {{ .Values.persistence.debug.subPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "grafana-pdf-exporter.fullname" . }}-data
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
