# -- Number of replicas to run
replicaCount: 1

# -- Docker image configuration
image:
  repository: man0s/grafana-pdf-exporter
  tag: "0.0.1"
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the name of the chart
nameOverride: ""

# -- Override the full name of the chart
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# -- Container security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# -- Service configuration
service:
  type: ClusterIP
  port: 3001

# -- Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -- Resource limits and requests
resources: {}
  # limits:
  #   cpu: 1000m
  #   memory: 2Gi
  # requests:
  #   cpu: 500m
  #   memory: 1Gi

# -- Horizontal Pod Autoscaler configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Node selector for pod placement
nodeSelector: {}

# -- Tolerations for pod placement
tolerations: []

# -- Affinity rules for pod placement
affinity: {}

# -- Persistent Volume Claim for output and debug directories
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  output:
    enabled: true
    mountPath: /usr/src/app/output
    subPath: output
  debug:
    enabled: false
    mountPath: /usr/src/app/debug
    subPath: debug

# ============================================
# Grafana PDF Exporter Configuration
# ============================================

# -- Grafana authentication credentials (use Kubernetes secrets in production)
grafana:
  # -- Grafana username (set via secret)
  user: "gfexp"
  # -- Grafana password or service account token (set via secret)
  password: "gfexp"
  # -- Whether to use Grafana service account authentication
  serviceAccount: false

# -- Existing secret name for Grafana credentials (if set, overrides grafana.user/password)
existingSecret: ""
# -- Key in the existing secret for the Grafana username
existingSecretUserKey: "username"
# -- Key in the existing secret for the Grafana password
existingSecretPasswordKey: "password"
# -- Key in the existing secret for the Grafana service account flag
existingSecretServiceAccountKey: "serviceAccount"

# -- Server configuration
server:
  port: 3001

# -- Puppeteer configuration
puppeteer:
  navigationTimeout: 120000
  executablePath: /usr/bin/chromium

# -- PDF output configuration
pdf:
  widthPx: 1920
  heightPx: "auto"
  addRandomStringToFileName: false
  forceKioskMode: true

# -- Dashboard rendering configuration
dashboard:
  hideControls: true
  expandCollapsedPanels: true
  expandTables: false
  debugMode: false
  extractDateAndNameFromHtml: false

# -- Query completion checks (for waiting until all Grafana queries resolve)
queryChecks:
  enabled: false
  maxQueryCompletionTime: 30000
  queriesInterval: 1000
  queriesCompletionTimeout: 60000
