services:
  grafana-export-to-pdf:
    build: .
    container_name: grafana-export-to-pdf
    ports:
      - "${EXPORT_SERVER_PORT:-3001}:${EXPORT_SERVER_PORT:-3001}"
    network_mode: "host"
    volumes:
      - ./output:/usr/src/app/output
      - ./debug:/usr/src/app/debug
    environment:
      # Grafana auth
      - GRAFANA_USER=${GRAFANA_USER:-gfexp}
      - GRAFANA_PASSWORD=${GRAFANA_PASSWORD:-gfexp}
      - GRAFANA_SERVICE_ACCOUNT=${GRAFANA_SERVICE_ACCOUNT:-false}

      # Server
      - EXPORT_SERVER_PORT=${EXPORT_SERVER_PORT:-3001}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - PUPPETEER_NAVIGATION_TIMEOUT=${PUPPETEER_NAVIGATION_TIMEOUT:-120000}

      # PDF output
      - PDF_WIDTH_PX=${PDF_WIDTH_PX:-1920}
      - PDF_HEIGHT_PX=${PDF_HEIGHT_PX:-auto}
      - ADD_RANDOM_STRING_TO_FILE_NAME=${ADD_RANDOM_STRING_TO_FILE_NAME:-false}
      - FORCE_KIOSK_MODE=${FORCE_KIOSK_MODE:-true}

      # Dashboard rendering
      - HIDE_DASHBOARD_CONTROLS=${HIDE_DASHBOARD_CONTROLS:-true}
      - EXPAND_COLLAPSED_PANELS=${EXPAND_COLLAPSED_PANELS:-true}
      - EXPAND_TABLES=${EXPAND_TABLES:-false}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - EXTRACT_DATE_AND_DASHBOARD_NAME_FROM_HTML_PANEL_ELEMENTS=${EXTRACT_DATE_AND_DASHBOARD_NAME_FROM_HTML_PANEL_ELEMENTS:-false}

      # Query completion checks
      - CHECK_QUERIES_TO_COMPLETE=${CHECK_QUERIES_TO_COMPLETE:-false}
      - CHECK_QUERIES_TO_COMPLETE_MAX_QUERY_COMPLETION_TIME=${CHECK_QUERIES_TO_COMPLETE_MAX_QUERY_COMPLETION_TIME:-30000}
      - CHECK_QUERIES_TO_COMPLETE_QUERIES_INTERVAL=${CHECK_QUERIES_TO_COMPLETE_QUERIES_INTERVAL:-1000}
      - CHECK_QUERIES_TO_COMPLETE_QUERIES_COMPLETION_TIMEOUT=${CHECK_QUERIES_TO_COMPLETE_QUERIES_COMPLETION_TIMEOUT:-60000}
